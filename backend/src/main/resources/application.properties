server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/street_monopoly
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.streetmonopoly.model
mybatis.type-handlers-package=com.streetmonopoly.config

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Mail (configure for your SMTP provider)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App config
app.admin-url=http://localhost:3000
app.player-url=http://localhost:3001
app.api-url=http://localhost:8080

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# Auth0 OAuth2 Resource Server
# Replace these with your Auth0 tenant values:
#   auth0.domain   = your Auth0 tenant domain (e.g. dev-abc123.us.auth0.com)
#   auth0.audience  = the API Identifier you create in Auth0 (e.g. https://streetmonopoly.api)
auth0.domain=${AUTH0_DOMAIN:your-tenant.us.auth0.com}
auth0.audience=${AUTH0_AUDIENCE:https://streetmonopoly.api}
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://${auth0.domain}/

# Serialize LocalDateTime as ISO strings ("2024-01-15T10:00:00") not arrays ([2024,1,15,10,0,0])
spring.jackson.serialization.write-dates-as-timestamps=false

# File uploads
app.images-bucket=${IMAGES_BUCKET:}
app.images-region=${AWS_REGION:eu-west-2}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
