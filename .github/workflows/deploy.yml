# GitHub Actions — Build & Deploy to AWS
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions → Secrets):
#   AWS_ACCESS_KEY_ID       — IAM user access key
#   AWS_SECRET_ACCESS_KEY   — IAM user secret key
#
# Required GitHub Secrets (continued):
#   TF_VAR_DB_PASSWORD      — PostgreSQL master password
#   TF_VAR_MAIL_PASSWORD    — SMTP password
#
# Required GitHub Variables (Settings → Secrets and variables → Actions → Variables):
#   AWS_REGION              — e.g. eu-west-2  (known before any Terraform runs)
#   TF_STATE_BUCKET         — S3 bucket holding Terraform state (you create this once manually)
#   TF_VAR_AUTH0_DOMAIN     — Auth0 tenant domain
#   TF_VAR_AUTH0_AUDIENCE   — Auth0 API audience
#   TF_VAR_AUTH0_CLIENT_ID  — Auth0 SPA client ID
#   TF_VAR_MAIL_USERNAME    — SMTP username
#
# All infrastructure IDs (EC2, S3 buckets, CloudFront) are read from Terraform state
# after apply, so they never need to be configured manually.

name: Build & Deploy

on:
  push:
    branches: [main]

jobs:

  # ---------------------------------------------------------------------------
  # Read infrastructure IDs from Terraform state so the deploy jobs don't need
  # them hardcoded as GitHub variables.
  # ---------------------------------------------------------------------------
  tf-apply:
    name: Apply Terraform Changes
    runs-on: ubuntu-latest
    outputs:
      ec2_instance_id:  ${{ steps.tf.outputs.ec2_instance_id }}
      admin_bucket:     ${{ steps.tf.outputs.admin_bucket }}
      player_bucket:    ${{ steps.tf.outputs.player_bucket }}
      admin_cf_id:      ${{ steps.tf.outputs.admin_cf_id }}
      player_cf_id:     ${{ steps.tf.outputs.player_cf_id }}
      admin_url:        ${{ steps.tf.outputs.admin_url }}
      player_url:       ${{ steps.tf.outputs.player_url }}
      images_bucket:    ${{ steps.tf.outputs.images_bucket }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_db_password:    ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_mail_password:  ${{ secrets.TF_VAR_MAIL_PASSWORD }}
          TF_VAR_auth0_domain:   ${{ vars.TF_VAR_AUTH0_DOMAIN }}
          TF_VAR_auth0_audience: ${{ vars.TF_VAR_AUTH0_AUDIENCE }}
          TF_VAR_auth0_client_id: ${{ vars.TF_VAR_AUTH0_CLIENT_ID }}
          TF_VAR_mail_username:  ${{ vars.TF_VAR_MAIL_USERNAME }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=street-monopoly/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}"
          terraform apply -auto-approve

      - name: Read outputs
        id: tf
        working-directory: terraform
        run: |
          echo "ec2_instance_id=$(terraform output -raw ec2_instance_id)"  >> "$GITHUB_OUTPUT"
          echo "admin_bucket=$(terraform output -raw admin_s3_bucket)"      >> "$GITHUB_OUTPUT"
          echo "player_bucket=$(terraform output -raw player_s3_bucket)"    >> "$GITHUB_OUTPUT"
          echo "admin_cf_id=$(terraform output -raw admin_cloudfront_id)"   >> "$GITHUB_OUTPUT"
          echo "player_cf_id=$(terraform output -raw player_cloudfront_id)" >> "$GITHUB_OUTPUT"
          echo "admin_url=$(terraform output -raw admin_app_url)"           >> "$GITHUB_OUTPUT"
          echo "player_url=$(terraform output -raw player_app_url)"         >> "$GITHUB_OUTPUT"
          echo "images_bucket=$(terraform output -raw images_s3_bucket)"    >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [tf-apply]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build JAR
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload JAR to S3
        run: |
          aws s3 cp backend/target/street-monopoly-api-1.0.0.jar \
            "s3://${{ needs.tf-apply.outputs.admin_bucket }}/deploy/app.jar" \
            --region "${{ vars.AWS_REGION }}"

      - name: Deploy to EC2 via SSM
        env:
          EC2_ID:         ${{ needs.tf-apply.outputs.ec2_instance_id }}
          ADMIN_URL:      ${{ needs.tf-apply.outputs.admin_url }}
          PLAYER_URL:     ${{ needs.tf-apply.outputs.player_url }}
          BUCKET:         ${{ needs.tf-apply.outputs.admin_bucket }}
          IMAGES_BUCKET:  ${{ needs.tf-apply.outputs.images_bucket }}
          REGION:         ${{ vars.AWS_REGION }}
        run: |
          PARAMS=$(jq -cn \
            --arg a "$ADMIN_URL" \
            --arg p "$PLAYER_URL" \
            --arg b "$BUCKET" \
            --arg i "$IMAGES_BUCKET" \
            --arg r "$REGION" \
            '{"commands": [
              "sed -i \"s|^APP_ADMIN_URL=.*|APP_ADMIN_URL=\($a)|\" /opt/streetmonopoly/app.env",
              "sed -i \"s|^APP_PLAYER_URL=.*|APP_PLAYER_URL=\($p)|\" /opt/streetmonopoly/app.env",
              "sed -i \"s|^APP_CORS_ALLOWED_ORIGINS=.*|APP_CORS_ALLOWED_ORIGINS=\($a),\($p)|\" /opt/streetmonopoly/app.env",
              "sed -i \"s|^IMAGES_BUCKET=.*|IMAGES_BUCKET=\($i)|\" /opt/streetmonopoly/app.env",
              "aws s3 cp s3://\($b)/deploy/app.jar /opt/streetmonopoly/app.jar --region \($r)",
              "chown streetmonopoly:streetmonopoly /opt/streetmonopoly/app.jar",
              "systemctl restart streetmonopoly"
            ]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --region "$REGION" \
            --query "Command.CommandId" --output text)

          echo "Waiting for SSM command: $COMMAND_ID"
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_ID" \
            --region "$REGION" || true

      - name: Remove deploy artifact from S3
        if: always()
        run: |
          aws s3 rm "s3://${{ needs.tf-apply.outputs.admin_bucket }}/deploy/app.jar" \
            --region "${{ vars.AWS_REGION }}" || true

  # ---------------------------------------------------------------------------
  deploy-admin:
    name: Deploy Admin App
    runs-on: ubuntu-latest
    needs: [tf-apply]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin-app/package-lock.json

      - name: Install & build
        working-directory: admin-app
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync admin-app/dist/ "s3://${{ needs.tf-apply.outputs.admin_bucket }}" \
            --delete --region "${{ vars.AWS_REGION }}"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.tf-apply.outputs.admin_cf_id }}" \
            --paths "/*"

  # ---------------------------------------------------------------------------
  deploy-player:
    name: Deploy Player App
    runs-on: ubuntu-latest
    needs: [tf-apply]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: player-app/package-lock.json

      - name: Install & build
        working-directory: player-app
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync player-app/dist/ "s3://${{ needs.tf-apply.outputs.player_bucket }}" \
            --delete --region "${{ vars.AWS_REGION }}"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.tf-apply.outputs.player_cf_id }}" \
            --paths "/*"
