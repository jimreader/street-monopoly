# GitHub Actions — Build & Deploy to AWS
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions → Secrets):
#   AWS_ACCESS_KEY_ID       — IAM user access key
#   AWS_SECRET_ACCESS_KEY   — IAM user secret key
#
# Required GitHub Variables (Settings → Secrets and variables → Actions → Variables):
#   AWS_REGION              — e.g. eu-west-2
#   EC2_INSTANCE_ID         — e.g. i-0abc123def456789
#   ADMIN_S3_BUCKET         — S3 bucket name for the admin app
#   PLAYER_S3_BUCKET        — S3 bucket name for the player app
#   ADMIN_CLOUDFRONT_ID     — CloudFront distribution ID for admin
#   PLAYER_CLOUDFRONT_ID    — CloudFront distribution ID for player
#   ADMIN_APP_URL           — Public URL of the admin app (e.g. https://d1234.cloudfront.net)
#   PLAYER_APP_URL          — Public URL of the player app (e.g. https://d5678.cloudfront.net)
#
# Get all values by running: cd terraform && terraform output

name: Build & Deploy

on:
  push:
    branches: [main]

jobs:

  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build JAR
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload JAR to S3
        run: |
          aws s3 cp backend/target/street-monopoly-api-1.0.0.jar \
            "s3://${{ vars.ADMIN_S3_BUCKET }}/deploy/app.jar" \
            --region "${{ vars.AWS_REGION }}"

      - name: Deploy to EC2 via SSM
        env:
          EC2_ID: ${{ vars.EC2_INSTANCE_ID }}
          ADMIN_URL: ${{ vars.ADMIN_APP_URL }}
          PLAYER_URL: ${{ vars.PLAYER_APP_URL }}
          BUCKET: ${{ vars.ADMIN_S3_BUCKET }}
          REGION: ${{ vars.AWS_REGION }}
        run: |
          PARAMS=$(jq -cn \
            --arg a "$ADMIN_URL" \
            --arg p "$PLAYER_URL" \
            --arg b "$BUCKET" \
            --arg r "$REGION" \
            '{"commands": [
              "sed -i \"s|^APP_ADMIN_URL=.*|APP_ADMIN_URL=\($a)|\" /opt/streetmonopoly/app.env",
              "sed -i \"s|^APP_PLAYER_URL=.*|APP_PLAYER_URL=\($p)|\" /opt/streetmonopoly/app.env",
              "sed -i \"s|^APP_CORS_ALLOWED_ORIGINS=.*|APP_CORS_ALLOWED_ORIGINS=\($a),\($p)|\" /opt/streetmonopoly/app.env",
              "aws s3 cp s3://\($b)/deploy/app.jar /opt/streetmonopoly/app.jar --region \($r)",
              "chown streetmonopoly:streetmonopoly /opt/streetmonopoly/app.jar",
              "systemctl restart streetmonopoly"
            ]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --region "$REGION" \
            --query "Command.CommandId" --output text)

          echo "Waiting for SSM command: $COMMAND_ID"
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_ID" \
            --region "$REGION" || true

      - name: Remove deploy artifact from S3
        if: always()
        run: |
          aws s3 rm "s3://${{ vars.ADMIN_S3_BUCKET }}/deploy/app.jar" \
            --region "${{ vars.AWS_REGION }}" || true

  # ---------------------------------------------------------------------------
  deploy-admin:
    name: Deploy Admin App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin-app/package-lock.json

      - name: Install & build
        working-directory: admin-app
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync admin-app/dist/ "s3://${{ vars.ADMIN_S3_BUCKET }}" \
            --delete --region "${{ vars.AWS_REGION }}"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.ADMIN_CLOUDFRONT_ID }}" \
            --paths "/*"

  # ---------------------------------------------------------------------------
  deploy-player:
    name: Deploy Player App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: player-app/package-lock.json

      - name: Install & build
        working-directory: player-app
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync player-app/dist/ "s3://${{ vars.PLAYER_S3_BUCKET }}" \
            --delete --region "${{ vars.AWS_REGION }}"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.PLAYER_CLOUDFRONT_ID }}" \
            --paths "/*"
