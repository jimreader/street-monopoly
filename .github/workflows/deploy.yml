# GitHub Actions — Build & Deploy to AWS
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions → Secrets):
#   AWS_ACCESS_KEY_ID       — IAM user access key
#   AWS_SECRET_ACCESS_KEY   — IAM user secret key
#
# Required GitHub Secrets (continued):
#   TF_VAR_DB_PASSWORD      — PostgreSQL master password
#   TF_VAR_MAIL_PASSWORD    — SMTP password
#
# Required GitHub Variables (Settings → Secrets and variables → Actions → Variables):
#   AWS_REGION              — e.g. eu-west-2  (known before any Terraform runs)
#   TF_STATE_BUCKET         — S3 bucket holding Terraform state (you create this once manually)
#   TF_VAR_AUTH0_DOMAIN     — Auth0 tenant domain
#   TF_VAR_AUTH0_AUDIENCE   — Auth0 API audience
#   TF_VAR_AUTH0_CLIENT_ID  — Auth0 SPA client ID
#   TF_VAR_MAIL_USERNAME    — SMTP username
#
# All infrastructure IDs (EC2, S3 buckets, CloudFront) are read from Terraform state
# after apply, so they never need to be configured manually.

name: Build & Deploy

on:
  push:
    branches: [main]

jobs:

  # ---------------------------------------------------------------------------
  # Read infrastructure IDs from Terraform state so the deploy jobs don't need
  # them hardcoded as GitHub variables.
  # ---------------------------------------------------------------------------
  tf-apply:
    name: Apply Terraform Changes
    runs-on: ubuntu-latest
    outputs:
      ec2_instance_id:  ${{ steps.tf.outputs.ec2_instance_id }}
      admin_bucket:     ${{ steps.tf.outputs.admin_bucket }}
      player_bucket:    ${{ steps.tf.outputs.player_bucket }}
      admin_cf_id:      ${{ steps.tf.outputs.admin_cf_id }}
      player_cf_id:     ${{ steps.tf.outputs.player_cf_id }}
      admin_url:        ${{ steps.tf.outputs.admin_url }}
      player_url:       ${{ steps.tf.outputs.player_url }}
      images_bucket:    ${{ steps.tf.outputs.images_bucket }}
      db_endpoint:      ${{ steps.tf.outputs.db_endpoint }}
      db_name:          ${{ steps.tf.outputs.db_name }}
      db_username:      ${{ steps.tf.outputs.db_username }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_db_password:    ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_mail_password:  ${{ secrets.TF_VAR_MAIL_PASSWORD }}
          TF_VAR_auth0_domain:   ${{ vars.TF_VAR_AUTH0_DOMAIN }}
          TF_VAR_auth0_audience: ${{ vars.TF_VAR_AUTH0_AUDIENCE }}
          TF_VAR_auth0_client_id: ${{ vars.TF_VAR_AUTH0_CLIENT_ID }}
          TF_VAR_mail_username:  ${{ vars.TF_VAR_MAIL_USERNAME }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=street-monopoly/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}"
          terraform apply -auto-approve

      - name: Read outputs
        id: tf
        working-directory: terraform
        run: |
          echo "ec2_instance_id=$(terraform output -raw ec2_instance_id)"  >> "$GITHUB_OUTPUT"
          echo "admin_bucket=$(terraform output -raw admin_s3_bucket)"      >> "$GITHUB_OUTPUT"
          echo "player_bucket=$(terraform output -raw player_s3_bucket)"    >> "$GITHUB_OUTPUT"
          echo "admin_cf_id=$(terraform output -raw admin_cloudfront_id)"   >> "$GITHUB_OUTPUT"
          echo "player_cf_id=$(terraform output -raw player_cloudfront_id)" >> "$GITHUB_OUTPUT"
          echo "admin_url=$(terraform output -raw admin_app_url)"           >> "$GITHUB_OUTPUT"
          echo "player_url=$(terraform output -raw player_app_url)"         >> "$GITHUB_OUTPUT"
          echo "images_bucket=$(terraform output -raw images_s3_bucket)"    >> "$GITHUB_OUTPUT"
          echo "db_endpoint=$(terraform output -raw rds_endpoint)"          >> "$GITHUB_OUTPUT"
          echo "db_name=$(terraform output -raw db_name)"                    >> "$GITHUB_OUTPUT"
          echo "db_username=$(terraform output -raw db_username)"            >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [tf-apply]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build JAR
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Wait for EC2 to be SSM-reachable
        env:
          EC2_ID: ${{ needs.tf-apply.outputs.ec2_instance_id }}
          REGION: ${{ vars.AWS_REGION }}
        run: |
          echo "Waiting for SSM agent on $EC2_ID..."
          for i in $(seq 1 24); do
            COUNT=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$EC2_ID" \
              --region "$REGION" \
              --query "length(InstanceInformationList)" \
              --output text 2>/dev/null || echo 0)
            if [ "$COUNT" -ge 1 ]; then
              echo "SSM agent ready after $((i * 10))s"
              break
            fi
            [ "$i" -eq 24 ] && echo "Timed out waiting for SSM" && exit 1
            echo "  not ready yet ($i/24)..."
            sleep 10
          done

      - name: Upload app.env and JAR to S3
        env:
          BUCKET:        ${{ needs.tf-apply.outputs.admin_bucket }}
          ADMIN_URL:     ${{ needs.tf-apply.outputs.admin_url }}
          PLAYER_URL:    ${{ needs.tf-apply.outputs.player_url }}
          IMAGES_BUCKET: ${{ needs.tf-apply.outputs.images_bucket }}
          DB_ENDPOINT:   ${{ needs.tf-apply.outputs.db_endpoint }}
          DB_NAME:       ${{ needs.tf-apply.outputs.db_name }}
          DB_USERNAME:   ${{ needs.tf-apply.outputs.db_username }}
          DB_PASSWORD:   ${{ secrets.TF_VAR_DB_PASSWORD }}
          AUTH0_DOMAIN:  ${{ vars.TF_VAR_AUTH0_DOMAIN }}
          AUTH0_AUDIENCE: ${{ vars.TF_VAR_AUTH0_AUDIENCE }}
          MAIL_USERNAME: ${{ vars.TF_VAR_MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.TF_VAR_MAIL_PASSWORD }}
          REGION:        ${{ vars.AWS_REGION }}
        run: |
          cat > /tmp/app.env << EOF
          SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_ENDPOINT}/${DB_NAME}
          SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
          SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
          AUTH0_DOMAIN=${AUTH0_DOMAIN}
          AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
          MAIL_USERNAME=${MAIL_USERNAME}
          MAIL_PASSWORD=${MAIL_PASSWORD}
          APP_ADMIN_URL=${ADMIN_URL}
          APP_PLAYER_URL=${PLAYER_URL}
          APP_API_URL=http://localhost:8080
          APP_CORS_ALLOWED_ORIGINS=${ADMIN_URL},${PLAYER_URL}
          IMAGES_BUCKET=${IMAGES_BUCKET}
          AWS_REGION=${REGION}
          JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=75.0 -XX:+UseSerialGC
          EOF
          # Strip leading whitespace added by the YAML indentation
          sed -i 's/^[[:space:]]*//' /tmp/app.env

          aws s3 cp /tmp/app.env \
            "s3://${BUCKET}/deploy/app.env" --region "$REGION"
          aws s3 cp backend/target/street-monopoly-api-1.0.0.jar \
            "s3://${BUCKET}/deploy/app.jar" --region "$REGION"

      - name: Deploy to EC2 via SSM
        env:
          EC2_ID:  ${{ needs.tf-apply.outputs.ec2_instance_id }}
          BUCKET:  ${{ needs.tf-apply.outputs.admin_bucket }}
          REGION:  ${{ vars.AWS_REGION }}
        run: |
          DEPLOY_SCRIPT=$(jq -rn \
            --arg b "$BUCKET" \
            --arg r "$REGION" \
            '"set -e\n" +
             "mkdir -p /opt/streetmonopoly\n" +
             "id streetmonopoly 2>/dev/null || useradd -r -s /bin/false streetmonopoly\n" +
             "if [ ! -f /etc/systemd/system/streetmonopoly.service ]; then\n" +
             "  printf '"'"'[Unit]\nDescription=Road Rush API\nAfter=network.target\n\n[Service]\nType=simple\nUser=streetmonopoly\nWorkingDirectory=/opt/streetmonopoly\nEnvironmentFile=/opt/streetmonopoly/app.env\nExecStart=/usr/bin/java -jar /opt/streetmonopoly/app.jar\nRestart=always\nRestartSec=10\nStandardOutput=journal\nStandardError=journal\n\n[Install]\nWantedBy=multi-user.target\n'"'"' > /etc/systemd/system/streetmonopoly.service\n" +
             "  systemctl daemon-reload && systemctl enable streetmonopoly\n" +
             "fi\n" +
             "aws s3 cp s3://\($b)/deploy/app.env /opt/streetmonopoly/app.env --region \($r)\n" +
             "chmod 600 /opt/streetmonopoly/app.env\n" +
             "chown streetmonopoly:streetmonopoly /opt/streetmonopoly/app.env\n" +
             "aws s3 cp s3://\($b)/deploy/app.jar /opt/streetmonopoly/app.jar --region \($r)\n" +
             "chown streetmonopoly:streetmonopoly /opt/streetmonopoly/app.jar\n" +
             "systemctl restart streetmonopoly"')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[$(echo "$DEPLOY_SCRIPT" | jq -Rs .)]}" \
            --region "$REGION" \
            --query "Command.CommandId" --output text)

          echo "Waiting for SSM command: $COMMAND_ID"
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_ID" \
            --region "$REGION" || true

      - name: Wait for backend to start
        env:
          EC2_ID: ${{ needs.tf-apply.outputs.ec2_instance_id }}
          REGION: ${{ vars.AWS_REGION }}
        run: |
          # Poll until port 8080 is listening (up to 90s), then dump logs regardless
          HEALTH_SCRIPT='
          set -e
          echo "=== Service status ==="
          systemctl status streetmonopoly --no-pager || true
          echo "=== Waiting for port 8080 ==="
          for i in $(seq 1 18); do
            if ss -tlnp 2>/dev/null | grep -q ":8080"; then
              echo "Port 8080 is listening after ${i}x5s"
              echo "=== Last 50 log lines ==="
              journalctl -u streetmonopoly --no-pager -n 50
              exit 0
            fi
            echo "  attempt $i/18..."
            sleep 5
          done
          echo "=== Port 8080 never became available. Full logs: ==="
          journalctl -u streetmonopoly --no-pager -n 100
          exit 1
          '

          HEALTH_ID=$(aws ssm send-command \
            --instance-ids "$EC2_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[$(echo "$HEALTH_SCRIPT" | jq -Rs .)]}" \
            --region "$REGION" \
            --query "Command.CommandId" --output text)

          aws ssm wait command-executed \
            --command-id "$HEALTH_ID" \
            --instance-id "$EC2_ID" \
            --region "$REGION" || true

          STDOUT=$(aws ssm get-command-invocation \
            --command-id "$HEALTH_ID" \
            --instance-id "$EC2_ID" \
            --region "$REGION" \
            --query "StandardOutputContent" --output text)
          STDERR=$(aws ssm get-command-invocation \
            --command-id "$HEALTH_ID" \
            --instance-id "$EC2_ID" \
            --region "$REGION" \
            --query "StandardErrorContent" --output text)
          RESULT=$(aws ssm get-command-invocation \
            --command-id "$HEALTH_ID" \
            --instance-id "$EC2_ID" \
            --region "$REGION" \
            --query "Status" --output text)

          echo "$STDOUT"
          echo "$STDERR"
          [ "$RESULT" = "Success" ] || exit 1

      - name: Remove deploy artifacts from S3
        if: always()
        run: |
          aws s3 rm "s3://${{ needs.tf-apply.outputs.admin_bucket }}/deploy/app.jar" \
            --region "${{ vars.AWS_REGION }}" || true
          aws s3 rm "s3://${{ needs.tf-apply.outputs.admin_bucket }}/deploy/app.env" \
            --region "${{ vars.AWS_REGION }}" || true

  # ---------------------------------------------------------------------------
  deploy-admin:
    name: Deploy Admin App
    runs-on: ubuntu-latest
    needs: [tf-apply]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin-app/package-lock.json

      - name: Install & build
        working-directory: admin-app
        env:
          VITE_AUTH0_DOMAIN: ${{ vars.TF_VAR_AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ vars.TF_VAR_AUTH0_CLIENT_ID }}
          VITE_AUTH0_AUDIENCE: ${{ vars.TF_VAR_AUTH0_AUDIENCE }}
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync admin-app/dist/ "s3://${{ needs.tf-apply.outputs.admin_bucket }}" \
            --delete --region "${{ vars.AWS_REGION }}"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.tf-apply.outputs.admin_cf_id }}" \
            --paths "/*"

  # ---------------------------------------------------------------------------
  deploy-player:
    name: Deploy Player App
    runs-on: ubuntu-latest
    needs: [tf-apply]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: player-app/package-lock.json

      - name: Install & build
        working-directory: player-app
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync player-app/dist/ "s3://${{ needs.tf-apply.outputs.player_bucket }}" \
            --delete --region "${{ vars.AWS_REGION }}"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.tf-apply.outputs.player_cf_id }}" \
            --paths "/*"
