# GitHub Actions — Terraform Plan
#
# Runs on:
#   - Every pull request targeting main (posts the plan as a PR comment)
#   - Every push to main (shows plan in logs after merge)
#   - Manual trigger from GitHub → Actions → Terraform Plan → Run workflow
#
# Uses the same secrets/variables as teardown.yml — no additional setup needed.

name: Terraform Plan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=street-monopoly/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform plan
        id: plan
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_mail_password: ${{ secrets.TF_VAR_MAIL_PASSWORD }}
          TF_VAR_auth0_domain: ${{ vars.TF_VAR_AUTH0_DOMAIN }}
          TF_VAR_auth0_audience: ${{ vars.TF_VAR_AUTH0_AUDIENCE }}
          TF_VAR_auth0_client_id: ${{ vars.TF_VAR_AUTH0_CLIENT_ID }}
          TF_VAR_mail_username: ${{ vars.TF_VAR_MAIL_USERNAME }}
        run: terraform plan -no-color 2>&1 | tee plan_output.txt

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const maxLength = 65000;
            const body = '### Terraform Plan\n```\n'
              + (plan.length > maxLength ? plan.slice(0, maxLength) + '\n\n...(truncated)' : plan)
              + '\n```';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('### Terraform Plan'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
